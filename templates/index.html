<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCare AI - Crop Disease Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-shape shape-1"></div>
    <div class="background-shape shape-2"></div>
    
    <div class="container glassmorphism">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"></path></svg>
                <h1>AgriCare AI</h1>
            </div>
            <p>Intelligent Crop Disease Detection System</p>
        </header>

        <main>
            <form action="/predict" method="POST" enctype="multipart/form-data" id="upload-form">
                <div class="upload-area" id="drop-area">
                    <input type="file" name="file" id="file-input" accept="image/*" required hidden>
                    <div class="upload-content">
                        <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <h3>Upload Leaf Image</h3>
                        <p>Drag & drop or click to browse</p>
                    </div>
                    <img id="image-preview" src="#" alt="Image Preview" style="display: none;">
                </div>
                <button type="submit" class="primary-btn" id="predict-btn" disabled>
                    <span>Predict Disease</span>
                    <div class="loader" id="btn-loader"></div>
                </button>
            </form>
        </main>
    </div>

    <div class="dev-footer">
        <h4>Developed by Rohit Prajapati</h4>
        <p><span class="highlight">Student Name:</span> Rohit Prajapati</p>
        <p><span class="highlight">College Name:</span> Jaypee University of Engineering And Technology</p>
        <p><span class="highlight">Department:</span> B.Tech-CSE</p>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
